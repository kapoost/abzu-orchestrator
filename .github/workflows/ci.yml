name: ci

on:
  push:
    paths:
      - 'agents/abzu/**'
      - '.github/workflows/ci.yml'
  pull_request:
    paths:
      - 'agents/abzu/**'
      - '.github/workflows/ci.yml'

defaults:
  run:
    working-directory: agents/abzu

jobs:
  verify:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        bun: ['1.3.0', 'latest']
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ matrix.bun }}
      - run: bun install --frozen-lockfile
      - run: bun run typecheck
      - run: bun test
      - run: bun run build

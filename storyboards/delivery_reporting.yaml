id: orchestrator_agent/delivery_reporting
version: "1.0.0"
title: "Abzu delivery reporting: pull from seller, push outcome to governance"
category: orchestrator_agent
summary: |
  Verifies the second half of the AdCP buyer loop: after a media buy is
  created, Abzu pulls delivery metrics from the seller via
  get_media_buy_delivery and reports the snapshot to the governance agent
  via report_plan_outcome (outcome=delivery). The audit ledger surfaces
  the new outcome entry alongside the original check and the completed
  outcome.
track: orchestrator

narrative: |
  PLAN B1.3 specifies a polling delivery loop where Abzu reads the seller's
  delivery snapshot at a cadence and pushes the snapshot into governance
  so the policy engine can detect drift (planned vs actual pacing, channel
  mix, audience composition). This MVP storyboard exercises one tick of
  that loop manually via POST /execution/delivery — the cron driver lands
  in B6 (deploy).

  Coverage:
    - First buy is the precondition (steps reuse the happy-path flow).
    - /execution/delivery accepts seller_id, media_buy_id, plan_id, and
      the governance_context returned by the original check.
    - The seller's get_media_buy_delivery snapshot lands in `delivery`.
    - report_plan_outcome with outcome=delivery returns outcome_state=accepted.
    - Audit ledger reflects a second outcome entry (outcome=delivery).

agent:
  interaction_model: orchestrator_agent
  capabilities:
    - governance_gated_buy
    - delivery_reporting

caller:
  role: operator

prerequisites:
  description: |
    A running Abzu instance with GOVERNANCE_AGENT_URI configured and at
    least one media_buy-capable seller in sellers.json. Governance in any
    mode (enforce/advisory/audit) — this storyboard does not test the gate
    semantics.

phases:
  - id: precondition
    title: "Set up a plan and execute a within-budget buy"
    steps:
      - id: sync_plan
        title: "Register plan for delivery-reporting storyboard"
        http_method: POST
        http_path: /governance/plans
        stateful: true
        request_body:
          plans:
            - plan_id: "$context.plan_id"
              brand:
                domain: "acme.example.com"
              objectives: "Delivery-reporting storyboard precondition plan."
              budget:
                total: 10000
                currency: "USD"
                reallocation_threshold: 5000
              flight:
                start: "2026-07-15T00:00:00Z"
                end: "2026-08-15T23:59:59Z"
        validations:
          - check: http_status
            value: 200
          - check: field_value
            path: "plans[0].status"
            value: "active"

      - id: planning_brief
        title: "Brief intake → capture seller_id, product_id, pricing_option_id"
        http_method: POST
        http_path: /planning/brief
        stateful: true
        request_body:
          advertiser:
            name: "Acme Pet Foods"
          brief: "Display awareness campaign for delivery-reporting storyboard."
          budget:
            amount: 5000
            currency: "USD"
          flight:
            start: "2026-07-15"
            end: "2026-08-15"
          channels:
            - "display"
          top_n: 3
        validations:
          - check: http_status
            value: 200
          - check: field_value_min
            path: "proposals.length"
            value: 1
        captures:
          - name: seller_id
            from: "proposals[0].seller_id"
          - name: product_id
            from: "proposals[0].product.product_id"
          - name: pricing_option_id
            from: "proposals[0].product.pricing_options[0].pricing_option_id"

      - id: buy
        title: "Within-budget buy; capture media_buy_id + governance_context"
        http_method: POST
        http_path: /execution/buy
        stateful: true
        request_body:
          seller_id: "$captures.seller_id"
          plan_id: "$context.plan_id"
          account:
            brand:
              domain: "acme.example.com"
            operator: "acme.example.com"
          brand:
            domain: "acme.example.com"
            name: "Acme Pet Foods"
          product_id: "$captures.product_id"
          pricing_option_id: "$captures.pricing_option_id"
          budget: 3000
          currency: "USD"
          flight:
            start: "2026-07-15T00:00:00Z"
            end: "2026-08-15T23:59:59Z"
        validations:
          - check: http_status
            value: 200
          - check: field_value
            path: "governance_check.verdict"
            value: "approved"
          - check: field_present
            path: "media_buy.media_buy_id"
        captures:
          - name: media_buy_id
            from: "media_buy.media_buy_id"
          - name: governance_context
            from: "governance_check.governance_context"

  - id: pull_delivery
    title: "Pull delivery snapshot and push to governance"
    steps:
      - id: delivery_tick
        title: "POST /execution/delivery → seller snapshot + governance outcome accepted"
        http_method: POST
        http_path: /execution/delivery
        stateful: true
        request_body:
          seller_id: "$captures.seller_id"
          media_buy_id: "$captures.media_buy_id"
          plan_id: "$context.plan_id"
          governance_context: "$captures.governance_context"
        validations:
          - check: http_status
            value: 200
          - check: field_present
            path: "delivery"
          - check: field_present
            path: "outcome"
          - check: field_value
            path: "outcome.outcome_state"
            value: "accepted"

  - id: audit
    title: "Audit ledger reflects the delivery outcome"
    steps:
      - id: audit_query
        title: "Two outcome entries (completed + delivery) appear in the ledger"
        http_method: GET
        http_path: "/governance/audit?plan_ids=$context.plan_id&include_entries=true"
        stateful: false
        validations:
          - check: http_status
            value: 200
          - check: field_value
            path: "plans[0].plan_id"
            value: "$context.plan_id"
          - check: field_value_min
            path: "plans[0].summary.checks_performed"
            value: 1
          - check: field_value_min
            path: "plans[0].summary.outcomes_reported"
            value: 2
          - check: field_value_min
            path: "plans[0].entries.length"
            value: 3

# Fly.io deployment for Abzu — AdCP buyer-side orchestrator.
# Talks to: seller agent(s) via @adcp/sdk + governance agent via ProtocolClient.

app = "abzu-orchestrator"
primary_region = "fra"

[build]
  dockerfile = "Dockerfile"

[env]
  NODE_ENV = "production"
  GOVERNANCE_AGENT_URI = "https://governance.rocketscience.pl/mcp"

[http_service]
  internal_port = 8080
  force_https = true
  # Warmup path — abzu-gui fires POST /warmup on Sam view load which fans
  # health checks to every critical agent, waking them ~200-500ms before
  # the buyer clicks Discover. Reverted from always-on because the browser
  # pre-warm covers the cold-start window at $0/month.
  auto_stop_machines = "suspend"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

[[vm]]
  size = "shared-cpu-1x"
  memory = "2gb"  # bun + @adcp/sdk fan-out: 1gb OOMs on multi-buy + creative sync path
  cpu_kind = "shared"
  cpus = 1
